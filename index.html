<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>白桦林探测局内部数据交换系统 - 登录</title>
    <style>
        body {
            background-color: #000080;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: "SimSun", serif;
        }
        .login-box {
            background: #000040;
            border: 2px solid #00FF00;
            padding: 40px;
            width: 350px;
            text-align: center;
        }
        .login-box h2 {
            color: #00FF00;
            margin-bottom: 30px;
            font-size: 18px;
        }
        .login-box label {
            color: #00FF00;
            display: block;
            text-align: left;
            margin: 10px 0 5px 0;
            font-size: 14px;
        }
        .login-box input {
            width: 100%;
            padding: 8px;
            background: #000020;
            border: 1px solid #008000;
            color: #00FF00;
            font-family: "Courier New", monospace;
            font-size: 14px;
            box-sizing: border-box;
        }
        .login-box button {
            margin-top: 25px;
            padding: 8px 40px;
            background: #004000;
            color: #00FF00;
            border: 1px solid #00FF00;
            cursor: pointer;
            font-size: 16px;
        }
        .login-box button:hover {
            background: #006000;
        }
        .error-msg {
            color: #FF0000;
            font-size: 12px;
            margin-top: 15px;
            min-height: 18px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>白桦林探测局<br>内部数据交换系统 v1.2</h2>
        <label>用户账号</label>
        <input type="text" id="username" placeholder="请输入观测员编号">

        <label>登录密码</label>
        <input type="password" id="password" placeholder="请输入密码">

        <button onclick="checkLogin()">登 录</button>

        <p id="errorMsg" class="error-msg"></p>
    </div>

    <script>
        function checkLogin() {
            var user = document.getElementById('username').value;
            var pass = document.getElementById('password').value;

            if (user === '032' && pass === '1526') {
                window.location.href = 'bbs.html';
            } else {
                document.getElementById('errorMsg').innerText = '账号或密码错误，请重试。';
            }
        }
    </script>
</body>
</html>
